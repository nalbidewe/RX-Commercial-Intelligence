<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hamza's Intelligence Center (HIC)</title>
  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    .navbar-brand { opacity: 0; transition: opacity 1.5s ease-in-out; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow">
  <div class="container-fluid">
    <a class="navbar-brand d-block text-center mx-auto" href="/">
      <i class="bi bi-lightbulb-fill me-2"></i>Hamza's Intelligence Center (HIC)
    </a>
  </div>
</nav>
<div class="container mt-4">
  {% block content %}{% endblock %}
</div>
<footer class="footer mt-4">
  <div class="container">
    <span><i class="bi bi-cpu me-1"></i>Intelligence Center &copy; 2025 | Crafted by Hamza (who else)</span>
  </div>
</footer>
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js">
</script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelector('.navbar-brand').style.opacity = '1';
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
